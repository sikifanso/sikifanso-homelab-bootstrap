# Helm values for External Secrets Operator
# Local-first defaults: single replica, CRDs installed

replicaCount: 1

installCRDs: true

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 200m

webhook:
  replicaCount: 1
  resources:
    requests:
      memory: 32Mi
      cpu: 25m
    limits:
      memory: 128Mi
      cpu: 100m

certController:
  replicaCount: 1
  resources:
    requests:
      memory: 32Mi
      cpu: 25m
    limits:
      memory: 128Mi
      cpu: 100m
