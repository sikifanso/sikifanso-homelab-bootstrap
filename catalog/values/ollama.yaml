# Helm values for Ollama local LLM inference
# Local-first defaults: single replica, CPU-only, pulls a small model on startup

replicaCount: 1

ollama:
  models:
    pull:
      - llama3.2:1b

resources:
  requests:
    memory: 1Gi
    cpu: 500m
  limits:
    memory: 4Gi
    cpu: 2000m

service:
  type: ClusterIP
  port: 11434

persistence:
  enabled: true
  size: 20Gi
  accessModes:
    - ReadWriteOnce

# GPU support (uncomment if GPU is available)
