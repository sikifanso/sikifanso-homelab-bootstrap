# Helm values for Temporal workflow engine
# Local-first defaults: single replica, uses cluster PostgreSQL

server:
  replicaCount: 1

  # Per-service resources — each Temporal component runs as its own Deployment,
  # so total cluster footprint is the sum of all four services.
  frontend:
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 384Mi
        cpu: 250m

  history:
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 768Mi
        cpu: 500m

  matching:
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 384Mi
        cpu: 250m

  worker:
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 384Mi
        cpu: 250m

web:
  replicaCount: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

# Disable Elasticsearch — visibility uses PostgreSQL via the persistence section below.
# The chart defaults to elasticsearch.enabled: true (3 replicas), which causes
# CrashLooping schema jobs on clusters without an Elasticsearch deployment.
elasticsearch:
  enabled: false

# Use cluster's PostgreSQL instance
postgresql:
  enabled: false

cassandra:
  enabled: false

mysql:
  enabled: false

schema:
  setup:
    enabled: true

# Persistence store - uses cluster's PostgreSQL instance
persistence:
  default:
    driver: sql
    sql:
      host: postgresql-rw.storage.svc.cluster.local
      port: 5432
      database: temporal
      user: temporal
      password: temporal

  visibility:
    driver: sql
    sql:
      host: postgresql-rw.storage.svc.cluster.local
      port: 5432
      database: temporal_visibility
      user: temporal
      password: temporal
