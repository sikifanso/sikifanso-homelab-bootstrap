# Helm values for Presidio (Microsoft PII detection)
# Local-first defaults: analyzer + anonymizer, single replicas

analyzer:
  replicaCount: 1
  # spaCy en_core_web_lg requires ~800Mi RSS at startup before processing any request
  resources:
    requests:
      memory: 768Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m

anonymizer:
  replicaCount: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m
