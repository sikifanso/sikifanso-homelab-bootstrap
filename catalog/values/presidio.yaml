# Helm values for Presidio (Microsoft PII detection)
# Local-first defaults: analyzer + anonymizer, single replicas

analyzer:
  replicaCount: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

anonymizer:
  replicaCount: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m
