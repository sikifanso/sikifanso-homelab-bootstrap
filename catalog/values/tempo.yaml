# Helm values for tempo
# Local-first defaults: single replica, filesystem storage, modest resources

tempo:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 200m

persistence:
  enabled: true
  size: 10Gi
  accessModes:
    - ReadWriteOnce

replicas: 1
