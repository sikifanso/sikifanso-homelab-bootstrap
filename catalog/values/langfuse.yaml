# Helm values for Langfuse
# Local-first defaults: single replica, wired to cluster PostgreSQL and Valkey
# Disables all bundled sub-charts — uses the cluster's shared instances

langfuse:
  # CHANGE BEFORE DEPLOYING — generate via: openssl rand -base64 32
  salt:
    value: "sikifanso-local-salt-change-me-before-prod"
  # CHANGE BEFORE DEPLOYING — generate via: openssl rand -hex 32
  encryptionKey:
    value: "ab2c5d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c"

# Disable bundled sub-charts — use cluster-wide PostgreSQL and Valkey
postgresql:
  deploy: false
  host: postgresql.storage.svc.cluster.local
  port: 5432
  auth:
    username: postgres
    password: changeme
    database: langfuse

redis:
  deploy: false
  host: valkey.storage.svc.cluster.local
  port: 6379
  auth:
    password: ""

clickhouse:
  deploy: false

s3:
  deploy: false

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 1Gi
    cpu: 500m
