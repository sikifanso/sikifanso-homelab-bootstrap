# Helm values for Langfuse
# Local-first defaults: single replica, uses cluster PostgreSQL

replicaCount: 1

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 1Gi
    cpu: 500m

# Langfuse requires PostgreSQL - uses the cluster's postgresql instance
postgresql:
  deploy: false
  host: postgresql.storage.svc.cluster.local
  port: 5432
  database: langfuse
