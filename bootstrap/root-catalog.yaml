apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: catalog
  namespace: argocd
spec:
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: tier
              operator: In
              values:
                - 0-operators
        - matchExpressions:
            - key: tier
              operator: In
              values:
                - 1-data
        - matchExpressions:
            - key: tier
              operator: In
              values:
                - 2-services
  generators:
    - git:
        repoURL: /local-gitops
        revision: HEAD
        files:
          - path: "catalog/*.yaml"
      selector:
        matchExpressions:
          - key: enabled
            operator: In
            values:
              - "true"
  template:
    metadata:
      name: "{{name}}"
      namespace: argocd
      labels:
        tier: "{{tier}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: "{{repoURL}}"
          chart: "{{chart}}"
          targetRevision: "{{targetRevision}}"
          helm:
            releaseName: "{{name}}"
            valueFiles:
              - $values/catalog/values/{{name}}.yaml
        - repoURL: /local-gitops
          targetRevision: HEAD
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      ignoreDifferences:
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.volumeClaimTemplates[]?.apiVersion
            - .spec.volumeClaimTemplates[]?.kind
        - group: postgresql.cnpg.io
          kind: Cluster
          jqPathExpressions:
            - .spec.imageName
      syncPolicy:
        # selfHeal ensures ArgoCD re-drives the sync if the manual SyncApplication
        # call in waitForAppear races with an in-flight reconcile and is dropped.
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 3
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
